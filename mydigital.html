<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.nms</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img {
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            pointer-events: none;
        }
        a img {
            pointer-events: none;
        }
        ::selection {
            background: rgba(0, 0, 255);
            color: #ffffff;
        }
        ::-moz-selection {
            background: rgba(0, 0, 255);
            color: #ffffff;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Zen Old Mincho', serif;
            line-height: 1.7;
            font-size: 18px;
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 20px 80px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #ffffff;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        nav a {
            color: rgba(0, 0, 255);
            text-decoration: none;
            transition: all 0.2s;
        }

        nav a:hover {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 6px;
        }

        @media (max-width: 768px) {
            body {
                padding: 24px 24px 60px;
                font-size: 16px;
            }

            h1 {
                font-size: 3.2rem;
                letter-spacing: -2px;
            }

            .subtitle {
                font-size: 1rem;
            }

            nav {
                flex-wrap: wrap;
                gap: 14px 20px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 20px 48px;
                font-size: 15px;
            }

            h1 {
                font-size: 2.5rem;
                letter-spacing: -1.5px;
            }

            nav {
                gap: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>www.nms</h1>
        <p class="subtitle">personal archive • 2026</p>
    </header>

    <nav>
        <a href="/projects">/projects</a>
        <a href="/works">/works</a>
        <a href="/writing">/writting</a>
        <a href="about.html">/about</a>
        <a href="/roll">/cameraroll</a>
        <a href="/contrast">/contrast</a>
        <a href="/code">/code</a>
    </nav>

</body>
</html>
